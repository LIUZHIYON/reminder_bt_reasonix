<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Reminder Board</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui,sans-serif;background:#0f1923;color:#e0e0e0;padding:20px;max-width:800px;margin:0 auto}
h1{color:#4fc3f7;text-align:center;margin:16px 0}.summary{display:flex;gap:12px;justify-content:center;margin:16px 0}
.summary span{background:#1a2733;padding:6px 18px;border-radius:20px;font-weight:600}
.s-pending{color:#ffa726}.s-triggered{color:#4fc3f7}.s-played{color:#66bb6a}
.card{background:#1a2733;border:1px solid #2a3f50;border-radius:8px;padding:14px;margin:8px 0}
.card b{color:#e0e0e0}.card small{color:#78909c;display:block;margin-top:4px}
.badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:.8em;font-weight:600}
.b-pending{background:#ffa72633;color:#ffa726}.b-triggered{background:#4fc3f733;color:#4fc3f7}.b-played{background:#66bb6a33;color:#66bb6a}
</style></head><body>
<h1>Reminder Board</h1>
<div class="summary">
<span class="s-pending" id="cnt-pending">pending: 0</span>
<span class="s-triggered" id="cnt-triggered">triggered: 0</span>
<span class="s-played" id="cnt-played">played: 0</span>
</div>
<div id="list">Connecting...</div>
<script>
var A="/api/reminders";
function fmt(d){try{var t=new Date(d);if(isNaN(t.getTime()))return d||"-";return t.getMonth()+1+"/"+t.getDate()+" "+String(t.getHours()).padStart(2,"0")+":"+String(t.getMinutes()).padStart(2,"0")}catch(e){return d||"-"}}
function esc(s){var d=document.createElement("div");d.textContent=s||"";return d.innerHTML}
async function load(){
  try{var r=await fetch(A);var d=await r.json();
    var items=Array.isArray(d)?d:[];
    document.getElementById("cnt-pending").textContent="pending: "+items.filter(function(x){return x&&x.status=="pending"}).length;
    document.getElementById("cnt-triggered").textContent="triggered: "+items.filter(function(x){return x&&x.status=="triggered"}).length;
    document.getElementById("cnt-played").textContent="played: "+items.filter(function(x){return x&&x.status=="played"}).length;
    try{
      items.sort(function(a,b){
        var ca=(a&&a.created_at)||"";
        var cb=(b&&b.created_at)||"";
        if(ca<cb)return 1;if(ca>cb)return -1;return 0;
      });
    }catch(e){}
    var html="";
    for(var i=0;i<items.length;i++){
      var r=items[i];
      if(!r)continue;
      var title=esc(r.title||"?");
      var status=r.status||"pending";
      var content=esc(r.content||"");
      var time=fmt(r.trigger_time);
      html+='<div class="card"><div><b>'+title+' <span class="badge b-'+status+'">'+status+'</span></b><small>'+time+' | '+content+'</small></div></div>';
    }
    document.getElementById("list").innerHTML=html||"No reminders";
  }catch(e){document.getElementById("list").innerHTML="Error: "+e.message}
}
load();setInterval(load,8000)
</script></body></html>
